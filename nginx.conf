worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # 上游服务
    upstream nodejs-argo {
        server 127.0.0.1:3002;
    }

    upstream vpngate-server {
        server 127.0.0.1:3001;
    }

    server {
        listen 3000;
        server_name _;

        # /sub 路由到 vpngate-server（返回 Railway 的 VLESS/VMess 连接配置）
        location /sub {
            proxy_pass http://vpngate-server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 连接页面（QR码 + 复制按钮）
        location /connect {
            proxy_pass http://vpngate-server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 健康检查 + 版本信息
        location = /health {
            default_type application/json;
            alias /tmp/version.json;
        }

        # VPN Gate 状态端点（内部管理用）
        location /vpngate/status {
            proxy_pass http://vpngate-server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # VPN Gate 刷新端点（内部管理用）
        location /vpngate/refresh {
            proxy_pass http://vpngate-server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 所有其他请求转发到 nodejs-argo
        location / {
            proxy_pass http://nodejs-argo;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
