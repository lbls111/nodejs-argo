<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNAKE_OS 2026 // 导航终端</title>
    <style>
        /* 基础与变量定义 */
        :root {
            --primary: #00f3ff;
            --secondary: #ff00ff;
            --bg-color: #030a14;
            --glass-bg: rgba(10, 20, 40, 0.5);
            --glass-border: rgba(0, 243, 255, 0.2);
            --text-main: #e0f8ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Consolas', 'Microsoft YaHei', monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Canvas 粒子背景 */
        #canvas-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            opacity: 0.6;
            pointer-events: none;
        }

        /* 扫描线遮罩特效 (CRT Scanline) */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
            background-size: 100% 4px;
            z-index: 999;
            pointer-events: none;
        }

        /* 主容器 */
        .app-container {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* 顶部 HUD 头部 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.1);
        }

        .sys-title {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary);
            letter-spacing: 2px;
        }

        .sys-clock {
            font-size: 18px;
            color: var(--secondary);
            text-shadow: 0 0 8px var(--secondary);
        }

        /* 搜索中枢 */
        .search-center {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        .search-box {
            display: flex;
            width: 100%;
            max-width: 600px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--primary);
            border-radius: 30px;
            padding: 5px;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
            transition: all 0.3s ease;
        }

        .search-box:focus-within {
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.5);
            transform: scale(1.02);
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 18px;
            padding: 10px 20px;
        }

        .search-box button {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 10px 30px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .search-box button:hover {
            background: #fff;
            box-shadow: 0 0 15px #fff;
        }

        /* 导航网格系统 */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .nav-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 20px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .nav-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--primary);
            transition: height 0.3s;
        }

        .nav-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(0, 243, 255, 0.2);
            border-color: var(--primary);
        }

        .card-title {
            font-size: 16px;
            color: var(--secondary);
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255, 0, 255, 0.2);
            padding-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .link-list {
            list-style: none;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .link-item a {
            color: var(--text-main);
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            transition: all 0.2s;
            padding: 5px;
            border-radius: 5px;
        }

        .link-item a:hover {
            color: var(--primary);
            background: rgba(0, 243, 255, 0.1);
            text-shadow: 0 0 5px var(--primary);
            padding-left: 10px;
        }

        /* 交互控制台 (保留原有的新年互动) */
        .terminal-panel {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #333;
            border-top: 2px solid var(--secondary);
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }

        .cmd-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .btn-tech {
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 8px 20px;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
        }

        .btn-tech:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 15px var(--primary);
        }

        .output-box {
            min-height: 60px;
            background: #000;
            color: #0f0;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            border-left: 3px solid #0f0;
            font-size: 15px;
        }

        .typing-cursor::after {
            content: '█';
            animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* 科技风烟花 (量子脉冲) */
        .quantum-pulse {
            position: fixed;
            width: 4px;
            height: 4px;
            pointer-events: none;
            z-index: 998;
            box-shadow: 0 0 10px currentColor;
        }
    </style>
</head>
<body>
    <canvas id="canvas-bg"></canvas>
    <div class="scanlines"></div>

    <div class="app-container">
        <!-- 头部 HUD -->
        <header>
            <div class="sys-title">
                SNAKE_OS <span style="color: #fff; font-weight: normal; font-size: 16px;">// V2026.01</span>
            </div>
            <div class="sys-clock" id="clock">00:00:00</div>
        </header>

        <!-- 搜索中枢 -->
        <div class="search-center">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Initialize search protocol...">
                <button onclick="executeSearch()">SEARCH</button>
            </div>
        </div>

        <!-- 导航卡片网格 -->
        <div class="nav-grid">
            <div class="nav-card">
                <div class="card-title">◆ AI Matrix</div>
                <ul class="link-list">
                    <li class="link-item"><a href="#">ChatGPT</a></li>
                    <li class="link-item"><a href="#">Claude</a></li>
                    <li class="link-item"><a href="#">Midjourney</a></li>
                    <li class="link-item"><a href="#">Kimi</a></li>
                </ul>
            </div>
            <div class="nav-card">
                <div class="card-title">◆ Dev Tools</div>
                <ul class="link-list">
                    <li class="link-item"><a href="#">GitHub</a></li>
                    <li class="link-item"><a href="#">StackOverflow</a></li>
                    <li class="link-item"><a href="#">Vercel</a></li>
                    <li class="link-item"><a href="#">Figma</a></li>
                </ul>
            </div>
            <div class="nav-card">
                <div class="card-title">◆ Media Hub</div>
                <ul class="link-list">
                    <li class="link-item"><a href="#">Bilibili</a></li>
                    <li class="link-item"><a href="#">YouTube</a></li>
                    <li class="link-item"><a href="#">Twitter/X</a></li>
                    <li class="link-item"><a href="#">Zhihu</a></li>
                </ul>
            </div>
        </div>

        <!-- 交互终端 (新年彩蛋模块) -->
        <div class="terminal-panel">
            <div class="cmd-buttons">
                <button class="btn-tech" onclick="executeFortune()">> Execute.Fortune()</button>
                <button class="btn-tech" style="border-color: var(--secondary); color: var(--secondary);" onclick="executeFireworks()">> Init.Quantum_Pulse()</button>
            </div>
            <div class="output-box">
                <span id="terminal-output" class="typing-cursor">SYSTEM READY. Click buttons or anywhere on screen to interact. Awaiting input...</span>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. 系统时钟
        // ==========================================
        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { hour12: false });
            document.getElementById('clock').innerText = timeStr + ' SYS';
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ==========================================
        // 2. 搜索功能 (模拟)
        // ==========================================
        function executeSearch() {
            const query = document.getElementById('searchInput').value;
            if(query) {
                window.open(`https://www.bing.com/search?q=${encodeURIComponent(query)}`, '_blank');
            }
        }
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') executeSearch();
        });

        // ==========================================
        // 3. 科技粒子网络背景 (Canvas)
        // ==========================================
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let width, height, particles;

        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 80; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 1,
                    vy: (Math.random() - 0.5) * 1,
                    size: Math.random() * 2 + 1
                });
            }
        }

        function drawParticles() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = 'rgba(0, 243, 255, 0.5)';
            ctx.strokeStyle = 'rgba(0, 243, 255, 0.15)';
            
            particles.forEach((p, index) => {
                p.x += p.vx;
                p.y += p.vy;
                
                if (p.x < 0 || p.x > width) p.vx *= -1;
                if (p.y < 0 || p.y > height) p.vy *= -1;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();

                for (let j = index + 1; j < particles.length; j++) {
                    const p2 = particles[j];
                    const dist = Math.sqrt((p.x - p2.x)**2 + (p.y - p2.y)**2);
                    if (dist < 120) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(drawParticles);
        }
        
        window.addEventListener('resize', initCanvas);
        initCanvas();
        drawParticles();

        // ==========================================
        // 4. 新年模块重构：终端打字机抽签
        // ==========================================
        const fortunes = [
            '[DATA PARSED] 概率预测：大吉。蛇年财富指数呈指数级增长！',
            '[DATA PARSED] 逻辑运算：桃花运进程已开启，连接建立中。',
            '[DATA PARSED] 状态报告：Bug清零，编译顺利，学业/事业高升！',
            '[DATA PARSED] 核心提示：好运协议已激活，福星高照。',
            '[DATA PARSED] 最终输出：2026 万事如意，系统稳定运行！'
        ];

        let typingTimer;
        function executeFortune() {
            const output = document.getElementById('terminal-output');
            const text = fortunes[Math.floor(Math.random() * fortunes.length)];
            output.innerText = '';
            clearInterval(typingTimer);
            
            let i = 0;
            typingTimer = setInterval(() => {
                output.innerText = text.substring(0, i) + (Math.random()>0.5 ? '█' : '');
                i++;
                if (i > text.length) {
                    clearInterval(typingTimer);
                    output.innerText = text;
                }
            }, 50);
        }

        // ==========================================
        // 5. 新年模块重构：量子脉冲(科技风烟花)
        // ==========================================
        function createPulse(x, y) {
            const colors = ['#00f3ff', '#ff00ff', '#00ff00', '#ffffff'];
            for (let i = 0; i < 20; i++) {
                const pulse = document.createElement('div');
                pulse.className = 'quantum-pulse';
                pulse.style.left = x + 'px';
                pulse.style.top = y + 'px';
                pulse.style.color = colors[Math.floor(Math.random() * colors.length)];
                pulse.style.backgroundColor = pulse.style.color;
                document.body.appendChild(pulse);
                
                const angle = Math.random() * Math.PI * 2;
                const velocity = 3 + Math.random() * 8;
                const vx = Math.cos(angle) * velocity;
                const vy = Math.sin(angle) * velocity;
                
                let posX = x, posY = y, opacity = 1;
                
                const animate = () => {
                    posX += vx;
                    posY += vy;
                    opacity -= 0.03;
                    
                    // 科技风专属：直角拐弯漂移效果
                    pulse.style.transform = `translate(${posX - x}px, ${posY - y}px) rotate(${Math.random()*90}deg)`;
                    pulse.style.opacity = opacity;
                    
                    if (opacity > 0) {
                        requestAnimationFrame(animate);
                    } else {
                        pulse.remove();
                    }
                };
                requestAnimationFrame(animate);
            }
        }

        function executeFireworks() {
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    createPulse(
                        window.innerWidth * 0.2 + Math.random() * window.innerWidth * 0.6,
                        window.innerHeight * 0.2 + Math.random() * window.innerHeight * 0.5
                    );
                }, i * 300);
            }
        }

        // 全局点击触发量子脉冲
        document.body.addEventListener('click', (e) => {
            if (e.target.tagName !== 'BUTTON' && e.target.tagName !== 'A' && e.target.tagName !== 'INPUT') {
                createPulse(e.clientX, e.clientY);
            }
        });
    </script>
</body>
</html>
